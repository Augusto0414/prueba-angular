<form [formGroup]="form" (ngSubmit)="onSubmit()" class="category-form">
  <div class="form-group">
    <label for="code">Código <span aria-label="requerido">*</span></label>
    <input
      id="code"
      formControlName="code"
      type="text"
      class="form-input"
      placeholder="Ej: CAT-001"
      aria-required="true"
    />
    @if (getError('code', 'required')) {
      <span class="error-message">El código es obligatorio</span>
    }
  </div>

  <div class="form-group">
    <label for="name">Nombre <span aria-label="requerido">*</span></label>
    <input
      id="name"
      formControlName="name"
      type="text"
      class="form-input"
      placeholder="Ej: Tecnología"
      aria-required="true"
    />
    @if (getError('name', 'required')) {
      <span class="error-message">El nombre es obligatorio</span>
    }
  </div>

  <div class="form-group">
    <label for="description">Descripción</label>
    <textarea
      id="description"
      formControlName="description"
      class="form-textarea"
      placeholder="Descripción de la categoría..."
      rows="4"
    ></textarea>
  </div>

  <div class="form-group">
    <label for="isActive">
      <input
        id="isActive"
        formControlName="isActive"
        type="checkbox"
        class="form-checkbox"
      />
      <span>Estado activo</span>
    </label>
  </div>

  <div class="form-actions">
    <button
      type="submit"
      class="btn btn-primary"
      [disabled]="!form.valid || isSubmitting()"
      aria-label="Guardar categoría"
    >
      {{ isSubmitting() ? 'Procesando...' : (isEditing() ? 'Actualizar' : 'Crear') }}
    </button>
    <button
      type="button"
      class="btn btn-secondary"
      (click)="onCancel()"
      aria-label="Cancelar"
    >
      Cancelar
    </button>
  </div>
</form>
